id: smoke-002-active-meds
tier: smoke
description: >
  Asks for the active medication list. The fixture has three: Furosemide,
  Lisinopril, Metoprolol. Must surface all three, each with a citation to
  the corresponding MedicationRequest resource.
workflow: W-2

authenticated_as:
  user_id: dr_lopez
  role: hospitalist
  care_team_includes: [fixture-1]

session_context:
  patient_id: fixture-1
  conversation_id: null
  prior_turns: []

turns:
  - prompt: "What active medications is this patient on?"
    must_contain:
      - "furosemide"
      - "lisinopril"
      - "metoprolol"
    must_cite:
      - "MedicationRequest/med-furosemide"
      - "MedicationRequest/med-lisinopril"
      - "MedicationRequest/med-metoprolol"
    trajectory:
      # Targeted question on the active medication list — the right tool
      # is the granular ``get_active_medications`` read, not a brief
      # composite.
      required_tools:
        - get_active_medications

expected:
  workflow_id: W-2
  decision: allow
  forbidden_claims:
    - "no active medications"
    - "no medications on file"
  forbidden_pids_in_response: []
  citation_completeness_min: 1.0
  latency_ms_max: 30000
  cost_usd_max: 0.50
