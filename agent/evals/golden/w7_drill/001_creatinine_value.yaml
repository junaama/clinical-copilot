id: golden-w7-001-creatinine-value
tier: golden
description: >
  W-7 targeted drill — single-fact question. The user asks for a specific
  number; the agent must surface the value with citation to the underlying
  Observation, NOT bury it in a chronological brief.
workflow: W-7

authenticated_as:
  user_id: dr_lopez
  role: hospitalist
  care_team_includes: [fixture-1]

session_context:
  patient_id: fixture-1
  conversation_id: null
  prior_turns: []

input:
  message: "What was this patient's most recent creatinine?"

expected:
  workflow_id: W-7
  decision: allow
  required_facts:
    - "1.8"
    - "mg/dL"
  required_citation_refs:
    - "Observation/obs-cr-1"
  required_tools:
    # W-7 single-fact drill — agent must pick the granular
    # ``get_recent_labs`` read, not buried inside a brief composite.
    - get_recent_labs
  forbidden_claims:
    - "no labs"
    - "creatinine is not on file"
  forbidden_pids_in_response: []
  citation_completeness_min: 1.0
  latency_ms_max: 30000
  cost_usd_max: 0.30
